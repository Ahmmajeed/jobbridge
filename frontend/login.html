<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JobBridge</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8fafc;
        }
        .auth-card {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .auth-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h2 class="auth-title">Login to JobBridge</h2>
            <form>
                <div class="form-group"><input type="email" class="form-control" placeholder="Email"></div>
                <div class="form-group"><input type="password" class="form-control" placeholder="Password"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            <p style="margin-top: 1.5rem;">Don't have an account? <a href="register.html" style="color: #2563eb; text-decoration: none;">Register here</a></p>
        </div>
    </div>
</body>
</html>
