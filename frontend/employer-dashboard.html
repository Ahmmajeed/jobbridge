<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">HireHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="employer-dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Post Job</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Candidates</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="container py-5">
        <h1 class="mb-4">Employer Dashboard</h1>

        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="card p-4 text-center">
                    <h5>Active Jobs</h5>
                    <p class="display-6 mb-0">12</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 text-center">
                    <h5>New Applications</h5>
                    <p class="display-6 mb-0">48</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 text-center">
                    <h5>Profile Views</h5>
                    <p class="display-6 mb-0">1,230</p>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">Open Job Listings</h5>
            </div>
            <div class="card-body">
                <div class="list-group">
                    <a href="job-details.html" class="list-group-item list-group-item-action">
                        Frontend Developer
                        <span class="badge bg-primary float-end">12 applicants</span>
                    </a>
                    <a href="#" class="list-group-item list-group-item-action">
                        Backend Developer
                        <span class="badge bg-primary float-end">9 applicants</span>
                    </a>
                    <a href="#" class="list-group-item list-group-item-action">
                        UI/UX Designer
                        <span class="badge bg-primary float-end">7 applicants</span>
                    </a>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Quick Actions</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <button class="btn btn-outline-primary w-100">Post New Job</button>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-outline-secondary w-100">View Applicants</button>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-outline-success w-100">Company Profile</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
