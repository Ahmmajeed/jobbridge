{% load static %}
<nav class="navbar">
    <div class="container navbar-container">
        <a href="{% url 'jobs:job_list' %}" class="logo">JobBridge</a>
        <ul class="nav-links" id="nav-links">
            <li><a href="{% url 'jobs:job_list' %}" class="nav-link">Jobs</a></li>

            {% if user.is_authenticated %}
                <li><a href="{% url 'accounts:dashboard' %}" class="nav-link">Dashboard</a></li>
                <li><a href="{% url 'accounts:logout' %}" class="nav-link btn-outline">Logout</a></li>
            {% else %}
                <li><a href="{% url 'accounts:login' %}" class="nav-link btn-outline">Login</a></li>
                <li><a href="{% url 'accounts:register' %}" class="nav-link btn-primary">Register</a></li>
            {% endif %}
        </ul>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</nav>

<script>
    // Ensure this script runs only once, even if navbar is included multiple times.
    if (!window.navbarScriptLoaded) {
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('nav-links');
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
        window.navbarScriptLoaded = true;
    }
</script>
